<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Mental Health Database logo">
  <defs>
    <!-- Позитивна половина (тепле світло) -->
    <linearGradient id="pos" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7CD6A6"/>
      <stop offset="1" stop-color="#34B27B"/>
    </linearGradient>
    <!-- Негативна/заспокійлива половина (прохолода) -->
    <linearGradient id="neg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6FA8E6"/>
      <stop offset="1" stop-color="#3E78C4"/>
    </linearGradient>
  </defs>

  <!-- Середня частина: два напівкола + серце (максимально заповнює канву) -->
  <g transform="translate(256 256)">
    <!-- Ліва (позитив) і права (заспокійлива) півкола -->
    <path d="M0,-246 A246,246 0 0,1 0,246 Z" fill="url(#pos)"/>
    <path d="M0,-246 A246,246 0 0,0 0,246 Z" fill="url(#neg)"/>
    <!-- Вісь балансу -->
    <line x1="0" y1="-246" x2="0" y2="246" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round"/>

    <!-- Серцевина — людина/серце, що тримає баланс -->
    <path d="M0,-43
             C 43,-95 115,-72 115,-7
             C 115,56 49,95 0,138
             C -49,95 -115,56 -115,-7
             C -115,-72 -43,-95 0,-43 Z"
          fill="#FFFFFF" opacity="0.96"/>
    <!-- Маленький пульс/баланс усередині -->
    <path d="M-56,10 L-20,-23 L0,13 L23,-30 L56,13"
          fill="none" stroke="#3E78C4" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
